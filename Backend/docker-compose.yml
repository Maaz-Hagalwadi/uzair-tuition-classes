services:
  postgres:
    image: postgres:16
    container_name: uzair_lms_postgres
    environment:
      POSTGRES_DB: uzair_lms
      POSTGRES_USER: utc
      POSTGRES_PASSWORD: admin1234
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: uzair_lms_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
