spring:
  application:
    name: uzair-tuition-lms

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/uzair_lms}
    username: ${DB_USERNAME:utc}
    password: ${DB_PASSWORD:admin1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-256-bit-secret-in-production}
    access-token-expiry: 900000      # 15 minutes in ms
    refresh-token-expiry: 604800000  # 7 days in ms

  aws:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    region: ${AWS_REGION:ap-south-1}
    s3:
      bucket: ${S3_BUCKET_NAME:uzair-lms-files}

management:
  endpoints:
    web:
      exposure:
        include: health,info
