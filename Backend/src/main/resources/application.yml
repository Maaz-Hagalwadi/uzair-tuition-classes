spring:
  application:
    name: uzair-tuition-lms

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/uzair_lms}
    username: ${DB_USERNAME:utc}
    password: ${DB_PASSWORD:admin1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1026}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
            scope: openid, profile, email

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: ${PORT:8090}

app:
  jwt:
    secret: ${JWT_SECRET:localdevelopmentsecretkey1234567890abcdefghijklmnopqrstuvwxyz12}
    access-token-expiry: 900000      # 15 minutes in ms
    refresh-token-expiry: 604800000  # 7 days in ms

  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  email-verify-expiry: 86400    # 24 hours in seconds
  password-reset-expiry: 900    # 15 minutes in seconds

  cookie:
    secure: ${COOKIE_SECURE:false}

  groq:
    api-key: ${GROQ_API_KEY:dummy}

  resend:
    api-key: ${RESEND_API_KEY:dummy}
    from: ${MAIL_FROM:onboarding@resend.dev}

  aws:
    access-key: ${AWS_ACCESS_KEY_ID:dummy}
    secret-key: ${AWS_SECRET_ACCESS_KEY:dummy}
    region: ${AWS_REGION:eu-north-1}
    s3:
      bucket: ${S3_BUCKET_NAME:dummy}

management:
  endpoints:
    web:
      exposure:
        include: health,info
