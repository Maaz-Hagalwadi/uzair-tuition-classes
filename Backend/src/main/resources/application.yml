spring:
  application:
    name: uzair-tuition-lms

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/uzair_lms}
    username: ${DB_USERNAME:utc}
    password: ${DB_PASSWORD:admin1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1026}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8090

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-256-bit-secret-in-production}
    access-token-expiry: 900000      # 15 minutes in ms
    refresh-token-expiry: 604800000  # 7 days in ms

  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  email-verify-expiry: 86400    # 24 hours in seconds
  password-reset-expiry: 900    # 15 minutes in seconds

  cookie:
    secure: false   # set true in production (requires HTTPS)

  aws:
    access-key: ${AWS_ACCESS_KEY_ID:AKIAUGP5NVNRBN4RD6V6}
    secret-key: ${AWS_SECRET_ACCESS_KEY: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}
    region: ${AWS_REGION:eu-north-1}
    s3:
      bucket: ${S3_BUCKET_NAME:bidforge-storage-2026}

management:
  endpoints:
    web:
      exposure:
        include: health,info
